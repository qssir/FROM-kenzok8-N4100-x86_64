name: Build daede image

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 把生成的固件发布到 GitHub Release
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      imagebuilder_url:
        description: ImmortalWrt ImageBuilder 下载地址
        required: true
        default: "https://downloads.immortalwrt.org/releases/25.12-SNAPSHOT/targets/x86/64/immortalwrt-imagebuilder-25.12-SNAPSHOT-x86-64.Linux-x86_64.tar.zst"
      preflight:
        description: 构建前先检查软件包清单是否齐全
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      rootfs_partsize:
        description: 根文件系统分区大小（MB）
        required: true
        default: "2048"
      install_daede:
        description: 把 luci-app-daede 打进固件
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      daede_release_tag:
        description: luci-app-daede 的 release 版本，默认 latest 取最新
        required: true
        default: "latest"
      daede_apk_url:
        description: 可选，直接指定 luci-app-daede 的 APK 下载地址
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            zstd \
            file \
            wget \
            curl \
            qemu-utils \
            genisoimage

      - name: Build image
        env:
          IMAGEBUILDER_URL: ${{ inputs.imagebuilder_url }}
          PREFLIGHT: ${{ inputs.preflight }}
          ROOTFS_PARTSIZE: ${{ inputs.rootfs_partsize }}
          INSTALL_DAEDE: ${{ inputs.install_daede }}
          DAEDE_RELEASE_TAG: ${{ inputs.daede_release_tag }}
          DAEDE_APK_URL: ${{ inputs.daede_apk_url }}
          GITHUB_TOKEN: ${{ github.token }}
          OUT_DIR: ${{ github.workspace }}/out
        run: |
          chmod +x scripts/build-image.sh
          scripts/build-image.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-daede-x86-64
          path: out/*
          if-no-files-found: error

      - name: Publish release
        if: inputs.publish_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: daede-${{ github.run_number }}
          name: daede 固件 ${{ github.run_number }}
          artifacts: out/*
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: out/BUILD-MANIFEST.txt
